# ~/.config/hypr/hyprlock.conf

# Background
background {
    path = screenshot
    blur_passes = 3
	blur_size = 6
}

# General
general {
}

# Time
label {
    text = $TIME12
    color = rgba(216, 222, 233, 1.0) 
	font_size = 67
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 275
    halign = center
    valign = center
}

# Day-Month-Date
label {
    text = cmd[update:1000] echo -e "$(date +"%A %d de %B")"
    color = rgba(216, 222, 233, 0.80)
    font_size = 20
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Profie-Photo
image {
    path = $HOME/.config/hypr/profile.png
    border_size = 2
    border_color = rgba(216, 222, 233, 0.80)
    size = 200
    rounding = -1
    position = 0, 25
    halign = center
    valign = center
}

# USER-BOX
shape {
    size = 320, 50
    color = rgba(255, 255, 255, 0.10)
    rounding = -1
    border_color = rgba(255, 255, 255, 0)
    position = 0, -150
    halign = center
    valign = center
}

# USER
label {
    text =      $USER
    color = rgba(216, 222, 233, 0.80)
    font_size = 16
    font_family = SF Pro Display Bold
    position = 0, -150
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.37 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.0)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99"></span></i>
    hide_input = false
    position = 0, -225
    halign = center
    valign = center
}

# Power off
label {
    text = 󰐥
    color = rgba(255, 255, 255, 0.80)
    font_size = 50
    onclick = shutdown now
    position = -150, 50
    halign = center
    valign = bottom
}

# Reboot
label {
    text = 󰜉
    color = rgba(255, 255, 255, 0.80)
    font_size = 50
    onclick = reboot now
    position = -50, 50
    halign = center
    valign = bottom
}

# Suspend
label {
    text = 󰤄
    color = rgba(255, 255, 255, 0.80)
    font_size = 50
    onclick = systemctl suspend
    position = 50, 50
    halign = center
    valign = bottom
}

# Botón Play/Pause (Playerctl)
label {
    text = ⏯
    color = rgba(255, 255, 255, 0.80)
    font_size = 50
    onclick = playerctl play-pause
    position = 150, 30
    halign = center
    valign = bottom
}

# CURRENT SONG
label {
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.7)
    font_size = 12
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 20
    halign = center
    valign = bottom
}
