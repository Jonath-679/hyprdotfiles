# # # # # # # # # # # # # # # # # # # # # # # #
#           CONFIGURACIÓN  HYPRLAND           #
# # # # # # # # # # # # # # # # # # # # # # # #

# --- VARIALBES ---
$monitorLaptop = eDP-1
$monitorSecundario = desc:Acer Technologies KB242Y G0 95380BD865W01
$mainMod = SUPER
$terminal = kitty


# --- MONITORES ---
# monitor = name, resolution, position, scale
monitor = $monitorLaptop, 1920x1080@60, 0x0, 1.0
monitor = $monitorSecundario, 1920x1080@75, auto-right, 1.0
monitor = , preferred, auto, 1.0


# --- ASIGNACION DE ESPACIOS DE TRABAJOS A LOS MONITORES ---
workspace = 1, monitor:$monitorLaptop
workspace = 2, monitor:$monitorLaptop
workspace = 3, monitor:$monitorLaptop
workspace = 4, monitor:$monitorLaptop
workspace = 5, monitor:$monitorLaptop
workspace = 6, monitor:  
workspace = 7, monitor:  
workspace = 8, monitor:  
workspace = 9, monitor:  
workspace = 10, monitor: 


# --- EXEC-ONCE ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent.service
exec-once = awww-daemon --no-cache
exec-once = $HOME/.config/hypr/scripts/awww-boot.sh
# Ejecuta ~/.config/rofi/cache.sh para cargar el background al iniciar hyprland
exec-once = bash -c 'WALLPAPER=$(sed -n "s/^wallpaper = //p" ~/.config/waypaper/config.ini | sed "s|~|$HOME|"); ~/.config/rofi/cache.sh "$WALLPAPER"'
exec-once = sleep 2.0 && wayle panel start
exec-once = sleep 3.0 && megasync


# --- VARIABLES DE ENTORNO ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = XCURSOR_THEME,Sweet-cursors
env = XCURSOR_SIZE,24


general {
    border_size = 2
    gaps_in = 5
    gaps_out = 10
    float_gaps = -1
    gaps_workspaces = 0
	
    #rgba(color[0000-ffff] + transparencia[00-ff])
    col.active_border = rgba(a9b1d6FF)
    col.inactive_border = rgba(a9b1d680)
    
    layout = dwindle
    no_focus_fallback = true
    resize_on_border = true
    extend_border_grab_area = 20
    
    snap:enabled = true
    snap:window_gap = 20
    snap:monitor_gap = 20
    snap:respect_gaps = true
}


decoration {
    rounding = 10
    rounding_power = 2.5
    active_opacity = 0.90
    inactive_opacity = 0.85
    fullscreen_opacity = 1.00
    
    blur:enabled = true
    blur:size = 6
    blur:passes = 3
    blur:ignore_opacity = true
}


animations {
    enabled = true
    
    # bezier = NOMBRE, X0, Y0, X1, Y1
    bezier = openRofi, 0.7, 0.0, 0.84, 0.0
    bezier = closeRofi, 0.7, 1.0, 0.84, 0.0

    # animation = NOMBRE, ONOFF, SPEED, CURVE [,STYLE]
    animation = layersIn, 1, 1.50, openRofi, popin 0%
    animation = fadeLayersIn, 1, 1.00, openRofi
	animation = layersOut, 1, 0.75, closeRofi, popin 0%
}


input {
    kb_layout = us
    kb_variant = altgr-intl
    repeat_rate = 25
    repeat_delay = 250
    sensitivity = 0.0
    accel_profile = flat
    
    scroll_method = 2fg
    natural_scroll = false
    follow_mouse = 1
	
    touchpad:disable_while_typing = true
	touchpad:natural_scroll = false
	touchpad:scroll_factor = 0.67
	touchpad:clickfinger_behavior = true
	touchpad:drag_lock = true
}


gestures {
    workspace_swipe_distance = 300
	workspace_swipe_invert = false
	
	# gesture = fingers, direction, action, options
	gesture = 3, horizontal, workspace
	gesture = 4, horizontal, workspace
	gesture = 3, vertical, workspace
	gesture = 4, vertical, workspace
}


group {
	groupbar:enabled = false
}


misc {
	disable_hyprland_logo = true
	disable_splash_rendering = true
	force_default_wallpaper = 0
	
	font_family = "Noto Sans"
	# disable_xdg_env_checks = false
}


# --- LAYOUT ---
dwindle:preserve_split = true
master:new_status = master
master:new_on_top = true


# --- WINDOWRULES ---
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, center on, size 1280 720
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on, center on, size 1280 720
windowrule = match:class ^(nwg-look)$, float on, center on, size 1280 720
windowrule = match:class ^(waypaper)$, float on, center on, size 432 768
windowrule = match:class ^(org.gnome.Calculator)$, float on, center on, size 432 768
windowrule = match:class ^(org.gnome.Loupe)$, float on, center on, size 1280 720
windowrule = match:class ^(xarchiver)$, float on, center on, size 1280 720
windowrule = match:class ^(mpv)$, float on, center on, size 1280 720
windowrule = match:class ^(thunar)$, match:title ^(Progreso de las operaciones de archivo)$, float on, center on, size 640 360


# --- EXTRA ---
xwayland:force_zero_scaling = true
binds:window_direction_monitor_fallback = false


# --- KEYBINDS ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, Escape, exec, wlogout --buttons-per-row 5
bind = SUPER, Space, exec, hyprctl --batch "dispatch togglefloating ; dispatch resizeactive exact 1280 720 ; dispatch centerwindow"
bind = $mainMod SHIFT, M, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, TAB, cyclenext, tiled
bindr = SUPER, SUPER_L, exec, pkill rofi || $HOME/.config/rofi/launcher.sh

# Grupos
bind = SUPER, G, togglegroup
bind = SUPER, tab, changegroupactive, f

# Cambiar de ventana
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Mover ventana
bind = $mainMod SHIFT, H, exec, ~/.config/hypr/scripts/move_wrap.sh l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, exec, ~/.config/hypr/scripts/move_wrap.sh r

# Cambiar de workspace [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Cambiar de workspace | MouseScroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Mover ventana | MouseScroll
bind = $mainMod SHIFT, mouse_down, movetoworkspace, r-1
bind = $mainMod SHIFT, mouse_up, movetoworkspace, r+1

# Mover ventana a un workspace [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Redimensionar ventanas con teclado
binde = $mainMod ALT, H, resizeactive, -50 0
binde = $mainMod ALT, J, resizeactive, 0 50
binde = $mainMod ALT, K, resizeactive, 0 -50
binde = $mainMod ALT, L, resizeactive, 50 0

# Mover y redimensionar ventanas con mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = , mouse:274, movewindow

# Control de Volumen
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1
bindel= , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Control de Brillo
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ScreenShot
bind = , Print, exec, $HOME/.config/hypr/scripts/screenshot-menu.sh

# Experimental ..
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
